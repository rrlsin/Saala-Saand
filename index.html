<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Saala Saand">
<meta name="theme-color" content="#080810">
<title>Saala Saand</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --bg2: #0f0f1c;
  --bg3: #16162a;
  --bg4: #1e1e35;
  --bg5: #252542;
  --border: #1e1e3a;
  --border2: #28284a;
  --text: #eeeef8;
  --text2: #8888aa;
  --text3: #4a4a6a;
  --accent: #c8ff00;
  --accent2: #a8d900;
  --accent-dim: rgba(200,255,0,0.08);
  --accent-glow: rgba(200,255,0,0.15);
  --green: #39d98a;
  --green-bg: #07201a;
  --red: #ff6b6b;
  --red-bg: #200d0d;
  --orange: #ff9f43;
  --orange-bg: #201008;
  --blue: #74b9ff;
  --blue-bg: #0a1628;
  --purple: #a29bfe;
  --purple-bg: #130d28;
  --gold: #ffd32a;
  --safe-top: env(safe-area-inset-top);
  --safe-bot: env(safe-area-inset-bottom);
  --radius: 16px;
  --radius-sm: 10px;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
}

/* ===== LIGHT MODE THEME ===== */
body.light-mode {
  --bg: #f4f4f0;
  --bg2: #ffffff;
  --bg3: #ebebe6;
  --bg4: #e2e2dc;
  --bg5: #d8d8d2;
  --border: #dcdcd6;
  --border2: #c8c8c2;
  --text: #111118;
  --text2: #555560;
  --text3: #999999;
  --accent: #5a8a00;
  --accent2: #4a7200;
  --accent-dim: rgba(90,138,0,0.08);
  --accent-glow: rgba(90,138,0,0.12);
  --green: #1a7a50;
  --green-bg: #e8f5ee;
  --red: #cc3333;
  --red-bg: #fdeaea;
  --orange: #c06010;
  --orange-bg: #fef3e8;
  --blue: #2060c0;
  --blue-bg: #e8f0fc;
  --purple: #6050c0;
  --purple-bg: #f0eefe;
}
body.light-mode::before { opacity: 0.08; }
body.light-mode #header { background: rgba(244,244,240,0.96); border-bottom-color: var(--border); }
body.light-mode #tabbar { background: rgba(255,255,255,0.96); border-top-color: var(--border); }
body.light-mode .notif-banner { background: #fff; box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 0 40px rgba(90,138,0,0.08); }
body.light-mode .stat-card::after { opacity: 0.15; }
body.light-mode .header-notif-btn { background: var(--bg3); }
body.light-mode .set-input { background: var(--bg3); }
body.light-mode .log-comment-input { background: var(--bg3); }
body.light-mode .pnote { background: var(--bg3); }
body.light-mode .fp-box { background: var(--bg3); }
body.light-mode .save-btn { box-shadow: 0 4px 24px rgba(90,138,0,0.2); }
body.light-mode #header-title { text-shadow: 0 0 20px rgba(90,138,0,0.2); }
body.light-mode .tab-btn.active .tab-icon { filter: drop-shadow(0 0 4px rgba(90,138,0,0.35)); }

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { 
  height: 100%; overflow: hidden; 
  background: var(--bg); 
  color: var(--text); 
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  transition: background 0.4s ease, color 0.4s ease;
}

/* NOISE TEXTURE OVERLAY */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 999;
  opacity: 0.4;
}

/* LAYOUT */
#app { display: flex; flex-direction: column; height: 100%; height: 100dvh; }

/* HEADER */
#header {
  padding: calc(var(--safe-top) + 14px) 20px 14px;
  background: linear-gradient(180deg, var(--bg) 0%, rgba(8,8,16,0.96) 100%);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
#header-title { 
  font-family: var(--font-display); 
  font-size: 28px; 
  letter-spacing: 0.04em; 
  color: var(--accent); 
  line-height: 1;
  text-shadow: 0 0 30px rgba(200,255,0,0.3);
}
#header-sub { font-size: 11px; color: var(--text3); margin-top: 3px; letter-spacing: 0.05em; text-transform: uppercase; font-weight: 500; }
#header-right { display: flex; gap: 8px; align-items: center; }
.header-notif-btn {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--bg3); border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px; position: relative;
  transition: background 0.2s;
}
.header-notif-btn:active { background: var(--bg4); }
.notif-dot {
  position: absolute; top: 6px; right: 6px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); border: 2px solid var(--bg);
  box-shadow: 0 0 8px var(--accent);
  animation: pulse-dot 2s infinite;
}
@keyframes pulse-dot {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.3); opacity: 0.7; }
}

/* CONTENT */
#content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--safe-bot) + 88px); }

/* TABBAR */
#tabbar {
  display: flex; 
  background: var(--bg2); 
  border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bot);
  position: sticky; bottom: 0;
  z-index: 100;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.tab-btn { 
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
  padding: 10px 4px 10px; gap: 4px; 
  border: none; background: none; color: var(--text3); 
  font-size: 10px; font-weight: 600; cursor: pointer; 
  transition: color 0.2s;
  font-family: var(--font-body);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.tab-btn.active { color: var(--accent); }
.tab-icon { font-size: 20px; line-height: 1; }
.tab-btn.active .tab-icon { filter: drop-shadow(0 0 6px rgba(200,255,0,0.5)); }

/* SCREENS */
.screen { display: none; padding: 18px; }
.screen.active { display: block; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* SECTION LABEL */
.section-label { 
  font-size: 10px; font-weight: 700; letter-spacing: 0.12em; 
  text-transform: uppercase; color: var(--text3); margin: 20px 0 10px; 
}

/* CARDS */
.card { 
  background: var(--bg2); 
  border: 1px solid var(--border); 
  border-radius: var(--radius); 
  padding: 16px; margin-bottom: 12px; 
  transition: border-color 0.2s;
}
.card-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.card-sub { font-size: 13px; color: var(--text2); line-height: 1.6; }

/* METRICS GRID */
.metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
.met { 
  background: var(--bg3); 
  border: 1px solid var(--border); 
  border-radius: var(--radius-sm); 
  padding: 12px;
}
.met-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; }
.met-value { font-size: 15px; font-weight: 700; color: var(--text); }

/* PHASE TABS */
.phase-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
.phase-tab { 
  flex: 1; padding: 9px; 
  border: 1px solid var(--border2); 
  border-radius: var(--radius-sm); 
  background: var(--bg2); color: var(--text2); 
  font-size: 12px; font-weight: 600; text-align: center; cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.2s;
  letter-spacing: 0.02em;
}
.phase-tab.active { 
  background: var(--accent); color: #000; 
  border-color: var(--accent); 
  box-shadow: 0 0 20px rgba(200,255,0,0.2);
}

/* WEEK GRID */
.wgrid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 16px; }
.day-cell { 
  border: 1px solid var(--border); 
  border-radius: var(--radius-sm); 
  padding: 8px 2px; text-align: center; cursor: pointer; 
  background: var(--bg2);
  transition: all 0.15s;
}
.day-cell.rest { background: var(--bg3); }
.day-cell.selected { border: 2px solid var(--accent); box-shadow: 0 0 12px rgba(200,255,0,0.15); }
.day-lbl { font-size: 9px; color: var(--text3); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
.day-type { font-size: 10px; font-weight: 700; color: var(--text); line-height: 1.2; }
.day-type.rest { color: var(--text3); font-weight: 400; }

/* EXERCISE ROW */
.ex-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: start; padding: 13px 0; border-bottom: 1px solid var(--border); }
.ex-row:last-child { border-bottom: none; }
.ex-name { font-size: 13px; font-weight: 700; color: var(--text); }
.ex-note { font-size: 12px; color: var(--text2); margin-top: 3px; line-height: 1.5; }
.ex-sets { font-size: 12px; font-weight: 700; color: var(--accent); white-space: nowrap; text-align: right; font-family: var(--font-mono); }
.badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 5px; margin-left: 6px; vertical-align: middle; letter-spacing: 0.04em; }
.b-fix { background: #201008; color: #ff9f43; border: 1px solid #3a1a08; }
.b-key { background: var(--green-bg); color: var(--green); border: 1px solid #0e3020; }
.b-trap { background: var(--purple-bg); color: var(--purple); border: 1px solid #1a1040; }
.b-swap { background: var(--red-bg); color: var(--red); border: 1px solid #3a1010; }

/* PNOTE */
.pnote { 
  background: var(--bg3); 
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm); 
  padding: 14px; margin-bottom: 16px; 
  font-size: 13px; color: var(--text2); line-height: 1.65; 
}

/* STEPS */
.ch-row { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 12px; }
.ch-row:last-child { margin-bottom: 0; }
.ch-num { 
  width: 28px; height: 28px; border-radius: 50%; 
  background: var(--bg3); border: 1px solid var(--border2); 
  display: flex; align-items: center; justify-content: center; 
  font-size: 12px; font-weight: 700; color: var(--text); flex-shrink: 0; margin-top: 1px;
  font-family: var(--font-mono);
}
.ch-num.neg { background: var(--red-bg); color: var(--red); border-color: #4a1010; }
.ch-num.pos { background: var(--green-bg); color: var(--green); border-color: #0e3020; }
.ch-text { font-size: 13px; color: var(--text); line-height: 1.55; font-weight: 600; }
.ch-sub { font-size: 12px; color: var(--text2); margin-top: 2px; line-height: 1.5; }

/* TABLE */
.ptable { width: 100%; border-collapse: collapse; font-size: 13px; }
.ptable th { font-size: 10px; font-weight: 700; color: var(--text3); text-align: left; padding: 7px 0 5px; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.08em; }
.ptable td { padding: 10px 6px 10px 0; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: top; line-height: 1.5; }
.ptable td:first-child { font-weight: 700; color: var(--text); }
.ptable tr:last-child td { border-bottom: none; }
.issue-badge { display: inline-block; font-size: 11px; padding: 4px 10px; border-radius: 6px; background: var(--red-bg); color: var(--red); margin-bottom: 12px; border: 1px solid #3a1010; font-weight: 600; }

/* CARDIO ROWS */
.crow { display: flex; gap: 12px; align-items: flex-start; padding: 12px 0; border-bottom: 1px solid var(--border); }
.crow:last-child { border-bottom: none; }
.ctag { min-width: 72px; font-size: 10px; font-weight: 700; padding: 4px 8px; border-radius: 7px; text-align: center; flex-shrink: 0; letter-spacing: 0.04em; text-transform: uppercase; }
.cinfo .ct { font-size: 13px; font-weight: 700; color: var(--text); }
.cinfo .cs { font-size: 12px; color: var(--text2); margin-top: 4px; line-height: 1.5; }

/* FP STEPS */
.fp-box { background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 14px; }
.fp-step { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 10px; }
.fp-step:last-child { margin-bottom: 0; }
.fp-num { 
  width: 24px; height: 24px; border-radius: 50%; 
  background: var(--green-bg); border: 1px solid #0e3020; 
  display: flex; align-items: center; justify-content: center; 
  font-size: 11px; font-weight: 700; color: var(--green); flex-shrink: 0;
  font-family: var(--font-mono);
}
.fp-text { font-size: 13px; color: var(--text); line-height: 1.55; font-weight: 500; }

/* MUSCLE FREQ */
.mfreq { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.mf-row { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg2); }
.mf-name { font-size: 12px; color: var(--text); flex: 1; font-weight: 600; }
.mf-dots { display: flex; gap: 3px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border2); }
.dot.on { background: var(--green); box-shadow: 0 0 6px rgba(57,217,138,0.5); }
.mf-count { font-size: 12px; color: var(--text2); min-width: 28px; text-align: right; font-family: var(--font-mono); }

/* ===== LOGGER SCREEN ===== */
.log-date-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
.log-date-btn { 
  width: 40px; height: 40px; border-radius: 12px; 
  background: var(--bg2); border: 1px solid var(--border2); 
  color: var(--text); font-size: 20px; 
  display: flex; align-items: center; justify-content: center; 
  cursor: pointer; flex-shrink: 0;
  transition: all 0.15s;
}
.log-date-btn:active { background: var(--bg4); border-color: var(--accent); }
.log-date-display { flex: 1; text-align: center; }
.log-date-main { font-family: var(--font-display); font-size: 22px; color: var(--text); letter-spacing: 0.04em; }
.log-date-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.log-workout-header { 
  background: var(--bg2); 
  border: 1px solid var(--border); 
  border-radius: var(--radius); 
  padding: 14px 16px; margin-bottom: 14px; 
  position: relative; overflow: hidden;
}
.log-workout-header::before {
  content: '';
  position: absolute; top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--accent);
  border-radius: 3px 0 0 3px;
}
.log-day-type { font-family: var(--font-display); font-size: 20px; color: var(--accent); letter-spacing: 0.04em; line-height: 1; }
.log-day-focus { font-size: 12px; color: var(--text2); margin-top: 5px; font-weight: 500; }

.log-ex-card { 
  background: var(--bg2); border: 1px solid var(--border); 
  border-radius: var(--radius); margin-bottom: 10px; overflow: hidden;
  transition: border-color 0.2s;
}
.log-ex-card:focus-within { border-color: var(--border2); }
.log-ex-header { padding: 14px 16px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.log-ex-name { font-size: 14px; font-weight: 700; color: var(--text); }
.log-ex-target { font-size: 11px; color: var(--text3); margin-top: 4px; font-family: var(--font-mono); }
.log-sets-area { padding: 12px 16px 14px; }
.log-set-row { display: grid; grid-template-columns: 28px 1fr 1fr 36px; gap: 7px; align-items: center; margin-bottom: 8px; }
.set-num { font-size: 11px; font-weight: 700; color: var(--text3); text-align: center; font-family: var(--font-mono); }
.set-input { 
  background: var(--bg3); 
  border: 1px solid var(--border2); 
  border-radius: 10px; 
  padding: 9px 10px; 
  color: var(--text); font-size: 15px; font-weight: 700; 
  text-align: center; width: 100%; 
  -webkit-appearance: none;
  font-family: var(--font-mono);
  transition: border-color 0.15s;
}
.set-input:focus { outline: none; border-color: var(--accent); background: var(--bg4); }
.set-input::placeholder { color: var(--text3); font-weight: 400; font-size: 12px; }
.set-done-btn { 
  width: 34px; height: 34px; border-radius: 10px; 
  background: var(--bg3); border: 1px solid var(--border2); 
  display: flex; align-items: center; justify-content: center; 
  font-size: 15px; cursor: pointer; color: var(--text3); flex-shrink: 0;
  transition: all 0.2s;
}
.set-done-btn.done { background: var(--green-bg); border-color: #0e3020; color: var(--green); box-shadow: 0 0 10px rgba(57,217,138,0.2); }
.log-add-set { 
  width: 100%; padding: 9px; 
  background: none; 
  border: 1px dashed var(--border2); 
  border-radius: 10px; color: var(--text3); font-size: 13px; cursor: pointer; 
  margin-top: 5px; font-family: var(--font-body); font-weight: 600;
  transition: all 0.2s;
}
.log-add-set:active { background: var(--bg3); }
.log-comment-row { padding: 0 16px 14px; }
.log-comment-input { 
  width: 100%; background: var(--bg3); 
  border: 1px solid var(--border); 
  border-radius: 10px; padding: 10px 12px; 
  color: var(--text); font-size: 13px; resize: none; height: 52px;
  font-family: var(--font-body);
  transition: border-color 0.15s;
}
.log-comment-input::placeholder { color: var(--text3); }
.log-comment-input:focus { outline: none; border-color: var(--border2); }
.log-set-input-labels { display: grid; grid-template-columns: 28px 1fr 1fr 36px; gap: 7px; margin-bottom: 5px; padding: 0 0 3px; }
.log-set-input-labels span { font-size: 9px; color: var(--text3); font-weight: 700; text-align: center; letter-spacing: 0.1em; text-transform: uppercase; }

.rest-day-log { text-align: center; padding: 48px 16px; }
.rest-day-icon { font-size: 56px; margin-bottom: 16px; filter: grayscale(0.2); }
.rest-day-txt { font-family: var(--font-display); font-size: 24px; color: var(--text); margin-bottom: 8px; letter-spacing: 0.04em; }
.rest-day-note { font-size: 13px; color: var(--text2); line-height: 1.65; }

.save-btn { 
  width: 100%; padding: 16px; 
  background: var(--accent); 
  border: none; border-radius: var(--radius); 
  color: #000; font-size: 15px; font-weight: 800; 
  cursor: pointer; margin-top: 16px; 
  font-family: var(--font-display);
  letter-spacing: 0.08em;
  transition: all 0.2s;
  box-shadow: 0 4px 24px rgba(200,255,0,0.25);
}
.save-btn:active { transform: scale(0.98); opacity: 0.9; }
.save-success { text-align: center; font-size: 13px; color: var(--green); margin-top: 10px; display: none; font-weight: 600; }

/* ===== HISTORY SCREEN ===== */
.history-empty { text-align: center; padding: 72px 20px; color: var(--text3); font-size: 14px; line-height: 1.7; }
.hist-day { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; cursor: pointer; }
.hist-day-header { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
.hist-day-date { font-size: 14px; font-weight: 700; color: var(--text); }
.hist-day-type { font-size: 12px; color: var(--text2); margin-top: 2px; }
.hist-day-meta { text-align: right; }
.hist-day-count { font-size: 13px; font-weight: 700; color: var(--accent); font-family: var(--font-mono); }
.hist-day-sets { font-size: 11px; color: var(--text3); margin-top: 2px; }
.hist-expand { padding: 0 16px 14px; display: none; }
.hist-expand.open { display: block; }
.hist-ex { margin-bottom: 12px; }
.hist-ex-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 7px; }
.hist-set-row { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; }
.hist-set-chip { background: var(--bg3); border-radius: 7px; padding: 4px 12px; font-size: 12px; color: var(--text); font-weight: 600; font-family: var(--font-mono); }
.hist-set-chip.done { border: 1px solid #0e3020; background: var(--green-bg); color: var(--green); }
.hist-comment { font-size: 12px; color: var(--text3); margin-top: 5px; font-style: italic; }

// Day = 6am–7pm → Light mode | Night = 7pm–6am → Dark mode
function getAutoTheme() {
  const h = new Date().getHours();
  return (h >= 6 && h < 19) ? 'light' : 'dark';
}

function applyTheme(forceTheme) {
  const s = getSettings();
  const mode = forceTheme || (s.themeMode === 'auto' ? getAutoTheme() : s.themeMode) || 'dark';
  document.body.classList.toggle('light-mode', mode === 'light');
  // Update meta theme-color for status bar
  const metaTheme = document.querySelector('meta[name="theme-color"]');
  if (metaTheme) metaTheme.content = mode === 'light' ? '#f4f4f0' : '#080810';
}

// Re-check theme every 60 seconds (catches 6am/7pm crossover)
setInterval(() => {
  const s = getSettings();
  if (s.themeMode === 'auto') applyTheme();
}, 60000);

function dateFromOffset(offset) {
  const d = new Date(); d.setDate(d.getDate() + offset); return d;
}
let logDateOffset = 0;
function getLogDate() { return dateFromOffset(logDateOffset); }
function fmtDate(d) { return d.toISOString().split('T')[0]; }
function fmtDateNice(d) {
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(d); target.setHours(0,0,0,0);
  const diff = Math.round((target - today) / 86400000);
  let rel = '';
  if (diff === 0) rel = 'Today';
  else if (diff === -1) rel = 'Yesterday';
  else if (diff === 1) rel = 'Tomorrow';
  else rel = days[d.getDay()];
  return { main: rel, sub: days[d.getDay()] + ', ' + d.getDate() + ' ' + months[d.getMonth()] };
}
function dayForDate(d) {
  const dow = d.getDay();
  const map = [6,0,1,2,3,4,5];
  return map[dow];
}
function tagBadge(tag) {

  return `<span class="badge ${cl[tag]}">${lb[tag]}</span>`;

// Returns the max kg logged for a given exercise name across all history.
// Looks at logs from the past ~8 days to find the "last week" performance.
function getLastWeekMax(exName, currentDateStr) {
  const current = new Date(currentDateStr + 'T00:00:00');
  let bestKg = null;
  let bestReps = null;
  // Check logs from 4 to 10 days ago to capture "last week same session"
  for (let i = 4; i <= 10; i++) {
    const d = new Date(current);
    d.setDate(d.getDate() - i);
    const ds = fmtDate(d);
    const log = loadLog(ds);
    if (!log) continue;
    // Check every exercise slot in that log
    Object.keys(log).forEach(key => {
      if (!key.startsWith('ex_')) return;
      const exData = log[key];
      if (!exData || !exData.sets) return;
      // Try to match exercise name via _meta exName — we store by index,
      // so we match by looking at the phase day exercises
      // We'll check all sets: if any set has data, look for name match via day
      // Since we don't store the name per set, we use the day's exercise list
      const meta = log._meta;
      if (!meta) return;
      const phaseIdx = meta.phase !== undefined ? meta.phase : 0;
      const dayOfLog = new Date(ds + 'T00:00:00');
      const dayIdx = dayForDate(dayOfLog);
      const dayExList = PHASES[phaseIdx] && PHASES[phaseIdx].days[dayIdx] && PHASES[phaseIdx].days[dayIdx].ex;
      if (!dayExList) return;
      const slotIdx = parseInt(key.replace('ex_', ''));
      const slotEx = dayExList[slotIdx];
      if (!slotEx) return;
      // Fuzzy match: same exercise name (case-insensitive, ignore parenthetical differences)
      const normalize = s => s.toLowerCase().replace(/\s*\(.*?\)\s*/g,'').trim();
      if (normalize(slotEx.n) !== normalize(exName)) return;
      // Find max weight in this slot
      exData.sets.forEach(set => {
        const kg = parseFloat(set.kg);
        const reps = parseInt(set.reps);
        if (!isNaN(kg) && kg > 0) {
          if (bestKg === null || kg > bestKg || (kg === bestKg && reps > (bestReps || 0))) {
            bestKg = kg;
            bestReps = isNaN(reps) ? null : reps;
          }
        }
      });
    });
  }
  return bestKg !== null ? { kg: bestKg, reps: bestReps } : null;
}

// Check if every set in every exercise of the current day log is ticked done
function isWorkoutComplete(saved, day) {
  if (!day.ex || day.ex.length === 0) return false;
  return day.ex.every((ex, ei) => {
    const exKey = 'ex_' + ei;
    const exData = saved[exKey];
    if (!exData || !exData.sets || exData.sets.length === 0) return false;
    return exData.sets.every(s => s.done);
  });
}

function renderLog() {
  const date = getLogDate();
  const dateStr = fmtDate(date);
  const dayIdx = dayForDate(date);
  const day = PHASES[logPhase].days[dayIdx];
  const { main, sub } = fmtDateNice(date);
  const saved = loadLog(dateStr) || {};

  let html = `<div class="screen active" id="screen-log">`;
  html += `<div class="log-date-bar">
    <button class="log-date-btn" onclick="shiftLogDate(-1)">‹</button>
    <div class="log-date-display">
      <div class="log-date-main">${main}</div>
      <div class="log-date-sub">${sub}</div>
    </div>
    <button class="log-date-btn" onclick="shiftLogDate(1)">›</button>
  </div>`;

  html += `<div class="phase-tabs" style="margin-bottom:14px;">
    <button class="phase-tab ${logPhase===0?'active':''}" onclick="setLogPhase(0)">Phase 1 — Cut</button>
    <button class="phase-tab ${logPhase===1?'active':''}" onclick="setLogPhase(1)">Phase 2 — Build</button>
  </div>`;

  if (day.rst) {
    html += `<div class="rest-day-log">
      <div class="rest-day-icon">😴</div>
      <div class="rest-day-txt">${day.l} — Rest Day</div>
      <div class="rest-day-note">${day.note}</div>
    </div>`;
    html += `</div>`; return html;
  }

  // Check if workout is fully done
  const workoutDone = isWorkoutComplete(saved, day);

  html += `<div class="log-workout-header">
    <div class="log-day-type">${day.l} — ${day.t}${workoutDone ? ' <span style="color:var(--green);font-size:18px;">✓</span>' : ''}</div>
    <div class="log-day-focus">${day.focus} · ${day.sub}</div>
  </div>`;

  // Show done banner if all sets completed
  if (workoutDone) {
    const totalSets = day.ex.reduce((acc, ex, ei) => {
      const exData = saved['ex_' + ei];
      return acc + (exData && exData.sets ? exData.sets.length : 0);
    }, 0);
    html += `<div class="workout-done-banner">
      <div class="wdb-icon">🏆</div>
      <div class="wdb-title">WORKOUT DONE</div>
      <div class="wdb-sub">${totalSets} sets completed · ${day.ex.length} exercises · Good work, hit the protein.</div>
    </div>`;
  }

  day.ex.forEach((ex, ei) => {
    const exKey = 'ex_' + ei;
    const exData = saved[exKey] || { sets: [{ kg: '', reps: '', done: false }], comment: '' };

    // Get last week's best for this exercise
    const lw = getLastWeekMax(ex.n, dateStr);
    let lwHtml = '';
    if (lw) {
      // Check if today's best already beats last week
      let todayBest = null;
      exData.sets.forEach(s => {
        const kg = parseFloat(s.kg);
        if (!isNaN(kg) && kg > 0 && (todayBest === null || kg > todayBest)) todayBest = kg;
      });
      const isPR = todayBest !== null && todayBest > lw.kg;
      lwHtml = `<div class="${isPR ? 'lw-hint lw-hint-pr' : 'lw-hint'}">
        ${isPR ? '🏆' : '📅'} <span class="lw-label">last wk</span>${lw.kg} kg${lw.reps ? ' × ' + lw.reps : ''}${isPR ? ' · NEW PR!' : ''}
      </div>`;
    }

    const allSetsDone = exData.sets.length > 0 && exData.sets.every(s => s.done);

    html += `<div class="log-ex-card" style="${allSetsDone ? 'border-color:rgba(57,217,138,0.3);' : ''}">
      <div class="log-ex-header">
        <div style="flex:1;">
          <div class="log-ex-name">${ex.n}${tagBadge(ex.tag)}${allSetsDone ? ' <span style="color:var(--green);font-size:13px;">✓</span>' : ''}</div>
          <div class="log-ex-target">${ex.s}${ex.note ? ' · ' + ex.note : ''}</div>
          ${lwHtml}
        </div>
      </div>
      <div class="log-sets-area">
        <div class="log-set-input-labels">
          <span>SET</span><span>KG</span><span>REPS</span><span>✓</span>
        </div>`;
    exData.sets.forEach((set, si) => {
      html += `<div class="log-set-row" id="setrow_${ei}_${si}">
        <div class="set-num">${si + 1}</div>
        <input class="set-input" type="number" inputmode="decimal" placeholder="kg" value="${set.kg}" onchange="updateSet(${ei},${si},'kg',this.value)">
        <input class="set-input" type="number" inputmode="numeric" placeholder="reps" value="${set.reps}" onchange="updateSet(${ei},${si},'reps',this.value)">
        <button class="set-done-btn ${set.done ? 'done' : ''}" onclick="toggleSetDone(${ei},${si})">✓</button>
      </div>`;
    });
    html += `<button class="log-add-set" onclick="addSet(${ei})">+ Add set</button>
      </div>
      <div class="log-comment-row">
        <textarea class="log-comment-input" placeholder="Notes / comments for this exercise…" onchange="updateComment(${ei},this.value)">${exData.comment || ''}</textarea>
      </div>
    </div>`;
  });

  html += `<button class="save-btn" onclick="saveWorkout()">${workoutDone ? '✅ SAVE & DONE' : 'SAVE WORKOUT'}</button>
    <div class="save-success" id="save-success">✅ Workout saved!</div>
  </div>`;
  return html;
}

function shiftLogDate(d) { logDateOffset += d; renderContent(); }
function setLogPhase(p) { logPhase = p; renderContent(); }
function getCurrentLogData() {
  const date = getLogDate(); const dateStr = fmtDate(date);
  return { dateStr, data: loadLog(dateStr) || {} };
}
function updateSet(ei, si, field, val) {
  const { dateStr, data } = getCurrentLogData();
  const exKey = 'ex_' + ei;
  if (!data[exKey]) data[exKey] = { sets: [], comment: '' };
  while (data[exKey].sets.length <= si) data[exKey].sets.push({ kg:'', reps:'', done:false });
  data[exKey].sets[si][field] = val; saveLog(dateStr, data);
}
function toggleSetDone(ei, si) {
  const { dateStr, data } = getCurrentLogData();
  const exKey = 'ex_' + ei;
  if (!data[exKey]) data[exKey] = { sets: [], comment: '' };
  while (data[exKey].sets.length <= si) data[exKey].sets.push({ kg:'', reps:'', done:false });
  data[exKey].sets[si].done = !data[exKey].sets[si].done;
  saveLog(dateStr, data);
  // Re-render fully so workout-done banner and green borders update live
  renderContent();
}
function addSet(ei) {
  const { dateStr, data } = getCurrentLogData();
  const exKey = 'ex_' + ei;
  if (!data[exKey]) data[exKey] = { sets: [], comment: '' };
  data[exKey].sets.push({ kg:'', reps:'', done:false });
  saveLog(dateStr, data); renderContent();
}
function updateComment(ei, val) {
  const { dateStr, data } = getCurrentLogData();
  const exKey = 'ex_' + ei;
  if (!data[exKey]) data[exKey] = { sets: [], comment: '' };
  data[exKey].comment = val; saveLog(dateStr, data);
}
function saveWorkout() {
  const { dateStr, data } = getCurrentLogData();
  const date = getLogDate(); const dayIdx = dayForDate(date);
  const day = PHASES[logPhase].days[dayIdx];
  data._meta = { dayType: day.t, focus: day.focus, phase: logPhase, savedAt: new Date().toISOString() };
  saveLog(dateStr, data);
  const el = document.getElementById('save-success');
  if (el) { el.style.display='block'; setTimeout(()=>{ el.style.display='none'; }, 2500); }
}

      const exName = day.ex && day.ex[ei] ? day.ex[ei].n : 'Exercise ' + (ei+1);
      html += `<div class="hist-ex"><div class="hist-ex-name">${exName}</div>`;
      (exData.sets||[]).forEach((s,si) => {
        html += `<div class="hist-set-row"><span class="hist-set-chip ${s.done?'done':''}">Set ${si+1}: ${s.kg?s.kg+' kg':'—'} × ${s.reps||'—'} reps${s.done?' ✓':''}</span></div>`;
      });
      if (exData.comment) html += `<div class="hist-comment">💬 ${exData.comment}</div>`;
      html += `</div>`;
    });
    html += `</div></div>`;
  });
  html += `</div>`; return html;
}
function toggleHist(dateStr) { expandedHist = expandedHist===dateStr?null:dateStr; renderContent(); }
function confirmDeleteLog(dateStr) {
  if (confirm('Delete this workout log?')) { deleteLog(dateStr); if(expandedHist===dateStr) expandedHist=null; renderContent(); }
}

// ============================================================
//  STATS SCREEN
// ============================================================
function renderStats() {
  const logs = getAllLogs();
  let html = `<div class="screen active" id="screen-stats">`;
  html += `<div class="screen-header">Stats & PRs</div>`;
  const totalWorkouts = logs.filter(l => {
    const dayIdx = dayForDate(new Date(l.dateStr + 'T00:00:00'));
    const phase = l.data._meta ? l.data._meta.phase : 0;
    return !PHASES[phase].days[dayIdx].rst;
  }).length;
  const totalSets = logs.reduce((acc,{data}) => acc + Object.keys(data).filter(k=>k.startsWith('ex_')).reduce((a,k)=>a+(data[k].sets||[]).length,0), 0);
  let streak = 0;
  const today = new Date(); today.setHours(0,0,0,0);
  for (let i = 0; i < 60; i++) {
    const d = new Date(today); d.setDate(d.getDate()-i);
    const ds = fmtDate(d);
    const dayIdx = dayForDate(d);
    const isRest = PHASES[0].days[dayIdx].rst;
    if (isRest) continue;
    if (logs.find(l=>l.dateStr===ds)) streak++;
    else break;
  }
  html += `<div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Workouts Logged</div><div class="stat-value">${totalWorkouts}</div></div>
    <div class="stat-card"><div class="stat-label">Total Sets</div><div class="stat-value">${totalSets}</div></div>
    <div class="stat-card"><div class="stat-label">Streak</div><div class="stat-value">${streak}<span class="stat-unit"> days</span></div></div>
    <div class="stat-card"><div class="stat-label">Weeks Active</div><div class="stat-value">${Math.max(1,Math.ceil(totalWorkouts/5))}</div></div>
  </div>`;
  html += `<div class="section-label">Personal Records</div>`;
  const prMap = {};
  logs.forEach(({data,dateStr}) => {
    const d = new Date(dateStr+'T00:00:00');
    const dayIdx = dayForDate(d);
    const phase = data._meta ? data._meta.phase : 0;
    const day = PHASES[phase] ? PHASES[phase].days[dayIdx] : null;
    if (!day||day.rst) return;
    Object.keys(data).filter(k=>k.startsWith('ex_')).forEach(k => {
      const ei = parseInt(k.replace('ex_',''));
      const exName = day.ex && day.ex[ei] ? day.ex[ei].n : null;
      if (!exName) return;
      const maxKg = Math.max(...(data[k].sets||[]).map(s=>parseFloat(s.kg)||0));
      if (maxKg > 0 && (!prMap[exName] || maxKg > prMap[exName])) prMap[exName] = maxKg;
    });
  });
  const prEntries = Object.entries(prMap).sort((a,b)=>b[1]-a[1]);
  if (prEntries.length === 0) {
    html += `<div class="card"><div class="card-sub">No PRs yet — start logging sets with weights to track records.</div></div>`;
  } else {
    html += `<div class="card pr-list">`;
    prEntries.forEach(([ex,kg]) => {
      html += `<div class="pr-row"><div class="pr-ex">${ex}</div><div class="pr-val">${kg} kg 🏆</div></div>`;
    });
    html += `</div>`;
  }
  html += `<div class="section-label">Last 14 days</div><div class="card"><div class="streak-bar">`;
  for (let i = 13; i >= 0; i--) {
    const d = new Date(today); d.setDate(d.getDate()-i);
    const ds = fmtDate(d);
    const dayIdx = dayForDate(d);
    const isRest = PHASES[0].days[dayIdx].rst;
    const hasLog = !!logs.find(l=>l.dateStr===ds);
    html += `<div class="streak-dot ${isRest?'rest':hasLog?'done':''}" title="${ds}"></div>`;
  }
  html += `</div>
    <div style="display:flex;gap:16px;margin-top:12px;font-size:11px;color:var(--text3);">
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--accent);vertical-align:middle;margin-right:4px;"></span>Trained</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--border);vertical-align:middle;margin-right:4px;"></span>Missed</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--bg3);border:1px solid var(--border2);vertical-align:middle;margin-right:4px;"></span>Rest day</span>
    </div>
  </div>`;
  html += `</div>`; return html;
}

// ============================================================
//  SETTINGS SCREEN
// ============================================================
function renderSettings() {
  const s = getSettings();
  const permStatus = 'Notification' in window ? Notification.permission : 'unsupported';
  const today = new Date();
  const dayIdx = dayForDate(today);
  const todayDay = PHASES[0].days[dayIdx];
  const timeStr = padTwo(s.notifHour) + ':' + padTwo(s.notifMinute);

  let html = `<div class="screen active" id="screen-settings">`;
  html += `<div class="screen-header">Settings</div>`;

  // Permission Card
  if (permStatus === 'default' || permStatus === 'unsupported') {
    html += `<div class="permission-card">
      <div class="permission-card-icon">🔔</div>
      <div class="permission-card-title">ENABLE NOTIFICATIONS</div>
      <div class="permission-card-sub">Get daily reminders for your workout and a personalised pre-workout tip at the exact time you set. Never miss a session.</div>
      ${permStatus === 'unsupported' ? 
        `<div style="font-size:13px;color:var(--red);font-weight:600;">Notifications not supported on this browser.</div>` :
        `<button class="perm-btn" onclick="requestNotifPermission()">ALLOW NOTIFICATIONS</button>
        <button class="perm-btn secondary" onclick="skipPermission()">Use in-app alerts only</button>`
      }
    </div>`;
  }

  // Notifications
  html += `<div class="settings-section">
    <div class="settings-section-title">Notifications</div>
    <div class="settings-row">
      <div class="settings-row-label">
        <div class="settings-row-title">Daily workout reminder</div>
        <div class="settings-row-sub">Get notified about today's session</div>
      </div>
      <div class="settings-row-right">
        <div class="toggle ${s.notifEnabled?'on':''}" onclick="toggleNotif()">
          <div class="toggle-thumb"></div>
        </div>
      </div>
    </div>
    <div class="settings-row" style="${!s.notifEnabled?'opacity:0.4;pointer-events:none;':''}">
      <div class="settings-row-label">
        <div class="settings-row-title">Notification time</div>
        <div class="settings-row-sub">Daily reminder fires at this time</div>
      </div>
      <div class="settings-row-right">
        <div class="time-picker-row">
          <input class="time-input" type="number" min="0" max="23" value="${padTwo(s.notifHour)}" onchange="setNotifHour(this.value)" id="notif-hour">
          <div class="time-sep">:</div>
          <input class="time-input" type="number" min="0" max="59" value="${padTwo(s.notifMinute)}" onchange="setNotifMinute(this.value)" id="notif-min">
        </div>
      </div>
    </div>
  </div>`;

  // Theme section
  const hour = new Date().getHours();
  const autoThemeNow = (hour >= 6 && hour < 19) ? 'Light' : 'Dark';
  html += `<div class="settings-section">
    <div class="settings-section-title">Appearance</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
      ${[
        { id:'auto', icon:'🌓', label:'Auto', sub:`${autoThemeNow} right now` },
        { id:'dark', icon:'🌑', label:'Dark', sub:'Always dark' },
        { id:'light', icon:'☀️', label:'Light', sub:'Always light' }
      ].map(opt => {
        const active = (s.themeMode || 'auto') === opt.id;
        return `<button onclick="setThemeMode('${opt.id}')" style="
          padding:14px 10px;
          background:${active ? 'var(--accent)' : 'var(--bg2)'};
          color:${active ? '#000' : 'var(--text)'};
          border:1px solid ${active ? 'var(--accent)' : 'var(--border2)'};
          border-radius:12px;
          font-family:var(--font-body);
          cursor:pointer;
          text-align:center;
          display:flex;flex-direction:column;align-items:center;gap:4px;
          transition:all 0.2s;
          ${active ? 'box-shadow:0 0 16px rgba(200,255,0,0.15);' : ''}
        ">
          <span style="font-size:24px;">${opt.icon}</span>
          <span style="font-size:13px;font-weight:700;">${opt.label}</span>
          <span style="font-size:10px;opacity:0.65;">${opt.sub}</span>
        </button>`;
      }).join('')}
    </div>
    <div style="margin-top:8px;font-size:11px;color:var(--text3);padding:0 2px;">Auto switches to light at 6am and dark at 7pm</div>
  </div>`;

  // Ringtone picker
  html += `<div class="settings-section">
    <div class="settings-section-title">Notification Sound</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${Object.entries(RINGTONES).map(([id, tone]) => {
        const active = (s.ringtone || 'barbell_drop') === id;
        return `<button onclick="setRingtone('${id}')" style="
          padding:13px 14px;
          background:${active ? 'var(--accent)' : 'var(--bg2)'};
          color:${active ? '#000' : 'var(--text)'};
          border:1px solid ${active ? 'var(--accent)' : 'var(--border2)'};
          border-radius:12px;
          font-family:var(--font-body);
          cursor:pointer;
          text-align:left;
          display:flex;align-items:center;gap:12px;
          width:100%;
          transition:all 0.15s;
          ${active ? 'box-shadow:0 0 16px rgba(200,255,0,0.15);' : ''}
        ">
          <span style="font-size:22px;flex-shrink:0;">${active ? '▶' : '▷'}</span>
          <span style="flex:1;">
            <span style="display:block;font-size:14px;font-weight:700;">${tone.label}</span>
            <span style="display:block;font-size:11px;opacity:0.65;margin-top:1px;">${tone.desc}</span>
          </span>
          ${active ? '<span style="font-size:11px;font-weight:700;opacity:0.7;">SELECTED</span>' : ''}
        </button>`;
      }).join('')}
    </div>
    <div style="margin-top:8px;font-size:11px;color:var(--text3);padding:0 2px;">Tap any sound to preview · selection saves automatically</div>
  </div>`;

  // Today's notification preview
  html += `<div class="settings-section">
    <div class="settings-section-title">Today's Notification Preview</div>
    <div class="today-notif-preview">
      <div class="tnp-label">Will fire at</div>
      <div class="tnp-time">${timeStr}</div>
      <div class="tnp-status">${s.notifEnabled ? '🟢 Active — reminder is on' : '🔴 Off — enable above to activate'}</div>
    </div>
    <div class="card" style="margin-top:0;">
      <div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;">Today's Workout</div>
      <div style="font-family:var(--font-display);font-size:18px;color:var(--accent);letter-spacing:0.04em;">${todayDay.t}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:4px;">${todayDay.rst ? todayDay.note : todayDay.focus + ' · ' + todayDay.sub}</div>
      ${!todayDay.rst && todayDay.ex ? `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;">Exercises</div>
      ${todayDay.ex.map(e=>`<div style="font-size:13px;color:var(--text);padding:4px 0;display:flex;justify-content:space-between;border-bottom:1px solid var(--border);">
        <span>${e.n}</span><span style="color:var(--accent);font-family:var(--font-mono);font-size:11px;">${e.s}</span>
      </div>`).join('')}` : ''}
    </div>
    <div style="margin-top:8px;">
      <button onclick="showTodayNotif()" style="width:100%;padding:12px;background:var(--bg3);border:1px solid var(--border2);border-radius:12px;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-body);">Preview Today's Notification</button>
    </div>
  </div>`;

  // Notification status
  html += `<div class="settings-section">
    <div class="settings-section-title">System Status</div>
    <div class="settings-row">
      <div class="settings-row-label">
        <div class="settings-row-title">Browser permission</div>
        <div class="settings-row-sub">System-level notification access</div>
      </div>
      <div class="settings-row-right">
        <div style="font-size:12px;font-weight:700;color:${permStatus==='granted'?'var(--green)':permStatus==='denied'?'var(--red)':'var(--orange)'};">
          ${permStatus==='granted'?'✓ Granted':permStatus==='denied'?'✕ Denied':'● Not set'}
        </div>
      </div>
    </div>
    <div class="settings-row">
      <div class="settings-row-label">
        <div class="settings-row-title">Reminders scheduled</div>
        <div class="settings-row-sub">Background check every 30 sec</div>
      </div>
      <div class="settings-row-right">
        <div style="font-size:12px;font-weight:700;color:${s.notifEnabled?'var(--green)':'var(--text3)'};">
          ${s.notifEnabled?'✓ Active':'Off'}
        </div>
      </div>
    </div>
  </div>`;

  if (permStatus === 'denied') {
    html += `<div class="card" style="border-color:rgba(255,107,107,0.3);background:var(--red-bg);">
      <div style="font-size:13px;color:var(--red);font-weight:600;margin-bottom:4px;">Notifications blocked</div>
      <div class="card-sub">You've blocked notifications for this site. To enable them, go to your browser settings → Site permissions → Notifications and allow this site.</div>
    </div>`;
  }

  // About
  html += `<div class="settings-section">
    <div class="settings-section-title">About</div>
    <div class="settings-row">
      <div class="settings-row-label">
        <div class="settings-row-title">🐂 Saala Saand</div>
        <div class="settings-row-sub">UL/UL/Full · 5 days/week · Cut → Lean Bulk</div>
      </div>
    </div>
    <div class="settings-row">
      <div class="settings-row-label">
        <div class="settings-row-title">Data storage</div>
        <div class="settings-row-sub">All data stored locally on this device</div>
      </div>
      <div class="settings-row-right" style="font-size:12px;color:var(--green);font-weight:600;">Private</div>
    </div>
  </div>`;

  html += `</div>`; return html;
}

function toggleNotif() {
  const s = getSettings();
  s.notifEnabled = !s.notifEnabled;
  saveSettings(s);
  scheduleNotifications();
  updateNotifDot();
  renderContent();
}

function setNotifHour(val) {
  const s = getSettings();
  s.notifHour = Math.min(23, Math.max(0, parseInt(val)||0));
  saveSettings(s);
}

function setNotifMinute(val) {
  const s = getSettings();
  s.notifMinute = Math.min(59, Math.max(0, parseInt(val)||0));
  saveSettings(s);
}

function setRingtone(id) {
  const s = getSettings();
  s.ringtone = id;
  saveSettings(s);
  playRingtone(id);
  renderContent();
}

function setThemeMode(mode) {
  const s = getSettings();
  s.themeMode = mode;
  saveSettings(s);
  applyTheme();
  renderContent();
}

function requestNotifPermission() {
  if (!('Notification' in window)) return;
  Notification.requestPermission().then(p => {
    const s = getSettings();
    s.notifPermission = p;
    if (p === 'granted') s.notifEnabled = true;
    saveSettings(s);
    scheduleNotifications();
    updateNotifDot();
    renderContent();
  });
}

function skipPermission() {
  const s = getSettings();
  s.notifEnabled = true;
  saveSettings(s);
  scheduleNotifications();
  updateNotifDot();
  renderContent();
}

function updateNotifDot() {
  const s = getSettings();
  const dot = document.getElementById('notif-dot');
  if (dot) dot.style.display = s.notifEnabled ? 'block' : 'none';
}

// ============================================================
//  INIT
// ============================================================
window._schedPhase = 0;
window._schedDay = 0;
applyTheme();
scheduleNotifications();
updateNotifDot();
renderContent();

// Show bell notification on first load if enabled
const _s = getSettings();
if (_s.notifEnabled) {
  const now = new Date();
  if (now.getHours() === _s.notifHour && now.getMinutes() === _s.notifMinute) {
    setTimeout(() => showNotifBanner(), 1500);
  }
}
</script>
