<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Saala Saand">
<meta name="theme-color" content="#0a0a0a">
<title>Saala Saand</title>
<style>
:root {
  --bg: #0a0a0a;
  --bg2: #141414;
  --bg3: #1e1e1e;
  --bg4: #252525;
  --border: #2a2a2a;
  --border2: #333;
  --text: #f0f0f0;
  --text2: #999;
  --text3: #666;
  --accent: #e8ff5a;
  --accent2: #c8df30;
  --green: #4ade80;
  --green-bg: #0d2b1a;
  --red: #f87171;
  --red-bg: #2b0d0d;
  --orange: #fb923c;
  --orange-bg: #2b1508;
  --blue: #60a5fa;
  --blue-bg: #0d1b2b;
  --purple: #a78bfa;
  --purple-bg: #1a0d2b;
  --safe-top: env(safe-area-inset-top);
  --safe-bot: env(safe-area-inset-bottom);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }

/* LAYOUT */
#app { display: flex; flex-direction: column; height: 100%; height: 100dvh; }
#header {
  padding: calc(var(--safe-top) + 14px) 18px 14px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
#header-title { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; color: var(--accent); }
#header-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
#content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--safe-bot) + 80px); }
#tabbar {
  display: flex; background: var(--bg2); border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bot);
  position: sticky; bottom: 0;
}
.tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 4px 8px; gap: 4px; border: none; background: none; color: var(--text3); font-size: 10px; font-weight: 500; cursor: pointer; transition: color 0.15s; }
.tab-btn.active { color: var(--accent); }
.tab-icon { font-size: 22px; line-height: 1; }

/* SCREENS */
.screen { display: none; padding: 16px; }
.screen.active { display: block; }

/* CARDS */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 12px; }
.card-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.card-sub { font-size: 13px; color: var(--text2); line-height: 1.55; }
.section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin: 18px 0 8px; }

/* METRICS GRID */
.metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
.met { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 10px 10px; }
.met-label { font-size: 10px; color: var(--text3); margin-bottom: 3px; }
.met-value { font-size: 16px; font-weight: 600; color: var(--text); }

/* PHASE TABS */
.phase-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
.phase-tab { flex: 1; padding: 9px; border: 1px solid var(--border2); border-radius: 10px; background: var(--bg2); color: var(--text2); font-size: 13px; font-weight: 500; text-align: center; cursor: pointer; }
.phase-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

/* WEEK GRID */
.wgrid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 14px; }
.day-cell { border: 1px solid var(--border); border-radius: 10px; padding: 7px 2px; text-align: center; cursor: pointer; background: var(--bg2); }
.day-cell.rest { background: var(--bg3); }
.day-cell.selected { border: 2px solid var(--accent); }
.day-lbl { font-size: 9px; color: var(--text3); margin-bottom: 2px; }
.day-type { font-size: 10px; font-weight: 600; color: var(--text); line-height: 1.2; }
.day-type.rest { color: var(--text3); font-weight: 400; }

/* EXERCISE ROW */
.ex-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: start; padding: 11px 0; border-bottom: 1px solid var(--border); }
.ex-row:last-child { border-bottom: none; }
.ex-name { font-size: 13px; font-weight: 600; color: var(--text); }
.ex-note { font-size: 12px; color: var(--text2); margin-top: 3px; line-height: 1.45; }
.ex-sets { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; text-align: right; }
.badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 5px; margin-left: 5px; vertical-align: middle; }
.b-fix { background: #2b1508; color: #fb923c; }
.b-key { background: var(--green-bg); color: var(--green); }
.b-trap { background: var(--purple-bg); color: var(--purple); }
.b-swap { background: var(--red-bg); color: var(--red); }

/* PNOTE */
.pnote { background: var(--bg3); border-radius: 10px; padding: 12px; margin-bottom: 14px; font-size: 13px; color: var(--text2); line-height: 1.6; }

/* STEPS */
.ch-row { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
.ch-row:last-child { margin-bottom: 0; }
.ch-num { width: 26px; height: 26px; border-radius: 50%; background: var(--bg3); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--text); flex-shrink: 0; margin-top: 1px; }
.ch-num.neg { background: var(--red-bg); color: var(--red); border-color: #5b1515; }
.ch-num.pos { background: var(--green-bg); color: var(--green); border-color: #155b2b; }
.ch-text { font-size: 13px; color: var(--text); line-height: 1.55; font-weight: 500; }
.ch-sub { font-size: 12px; color: var(--text2); margin-top: 2px; line-height: 1.45; }

/* TABLE */
.ptable { width: 100%; border-collapse: collapse; font-size: 13px; }
.ptable th { font-size: 11px; font-weight: 500; color: var(--text3); text-align: left; padding: 6px 0 4px; border-bottom: 1px solid var(--border); }
.ptable td { padding: 9px 6px 9px 0; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: top; line-height: 1.5; }
.ptable td:first-child { font-weight: 600; }
.ptable tr:last-child td { border-bottom: none; }
.issue-badge { display: inline-block; font-size: 11px; padding: 3px 9px; border-radius: 5px; background: var(--red-bg); color: var(--red); margin-bottom: 10px; }

/* CARDIO ROWS */
.crow { display: flex; gap: 10px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); }
.crow:last-child { border-bottom: none; }
.ctag { min-width: 72px; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; text-align: center; flex-shrink: 0; }
.cinfo .ct { font-size: 13px; font-weight: 600; color: var(--text); }
.cinfo .cs { font-size: 12px; color: var(--text2); margin-top: 3px; line-height: 1.5; }

/* FP STEPS */
.fp-box { background: var(--bg3); border-radius: 10px; padding: 12px; margin-bottom: 12px; }
.fp-step { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 9px; }
.fp-step:last-child { margin-bottom: 0; }
.fp-num { width: 22px; height: 22px; border-radius: 50%; background: var(--green-bg); border: 1px solid #155b2b; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--green); flex-shrink: 0; }
.fp-text { font-size: 13px; color: var(--text); line-height: 1.5; }

/* MUSCLE FREQ */
.mfreq { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.mf-row { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg2); }
.mf-name { font-size: 13px; color: var(--text); flex: 1; }
.mf-dots { display: flex; gap: 3px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border2); }
.dot.on { background: var(--green); }
.mf-count { font-size: 12px; color: var(--text2); min-width: 28px; text-align: right; }

/* ===== LOGGER SCREEN ===== */
.log-date-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.log-date-btn { width: 38px; height: 38px; border-radius: 10px; background: var(--bg2); border: 1px solid var(--border2); color: var(--text); font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.log-date-display { flex: 1; text-align: center; }
.log-date-main { font-size: 17px; font-weight: 700; color: var(--text); }
.log-date-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }
.log-workout-header { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; margin-bottom: 12px; }
.log-day-type { font-size: 13px; font-weight: 700; color: var(--accent); }
.log-day-focus { font-size: 12px; color: var(--text2); margin-top: 2px; }

.log-ex-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 10px; overflow: hidden; }
.log-ex-header { padding: 12px 14px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.log-ex-name { font-size: 14px; font-weight: 700; color: var(--text); }
.log-ex-target { font-size: 12px; color: var(--text3); margin-top: 3px; }
.log-sets-area { padding: 10px 14px 12px; }
.log-set-row { display: grid; grid-template-columns: 30px 1fr 1fr 36px; gap: 6px; align-items: center; margin-bottom: 7px; }
.set-num { font-size: 12px; font-weight: 600; color: var(--text3); text-align: center; }
.set-input { background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; padding: 8px 10px; color: var(--text); font-size: 15px; font-weight: 600; text-align: center; width: 100%; -webkit-appearance: none; }
.set-input:focus { outline: none; border-color: var(--accent); }
.set-input::placeholder { color: var(--text3); font-weight: 400; font-size: 13px; }
.set-done-btn { width: 32px; height: 32px; border-radius: 8px; background: var(--bg3); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; color: var(--text3); flex-shrink: 0; }
.set-done-btn.done { background: var(--green-bg); border-color: #155b2b; color: var(--green); }
.log-add-set { width: 100%; padding: 8px; background: none; border: 1px dashed var(--border2); border-radius: 8px; color: var(--text3); font-size: 13px; cursor: pointer; margin-top: 4px; }
.log-comment-row { padding: 0 14px 12px; }
.log-comment-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; color: var(--text); font-size: 13px; resize: none; height: 52px; }
.log-comment-input::placeholder { color: var(--text3); }
.log-comment-input:focus { outline: none; border-color: var(--accent); }
.log-set-input-labels { display: grid; grid-template-columns: 30px 1fr 1fr 36px; gap: 6px; margin-bottom: 4px; padding: 0 0 2px; }
.log-set-input-labels span { font-size: 10px; color: var(--text3); font-weight: 500; text-align: center; letter-spacing: 0.05em; }
.rest-day-log { text-align: center; padding: 32px 16px; }
.rest-day-icon { font-size: 48px; margin-bottom: 12px; }
.rest-day-txt { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.rest-day-note { font-size: 13px; color: var(--text2); line-height: 1.6; }
.save-btn { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 14px; color: #000; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 14px; }
.save-btn:active { opacity: 0.85; }
.save-success { text-align: center; font-size: 13px; color: var(--green); margin-top: 8px; display: none; }

/* ===== HISTORY SCREEN ===== */
.history-empty { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 15px; }
.hist-day { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 10px; overflow: hidden; cursor: pointer; }
.hist-day-header { padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; }
.hist-day-date { font-size: 14px; font-weight: 700; color: var(--text); }
.hist-day-type { font-size: 12px; color: var(--text2); margin-top: 2px; }
.hist-day-meta { text-align: right; }
.hist-day-count { font-size: 13px; font-weight: 600; color: var(--accent); }
.hist-day-sets { font-size: 11px; color: var(--text3); margin-top: 1px; }
.hist-expand { padding: 0 14px 12px; display: none; }
.hist-expand.open { display: block; }
.hist-ex { margin-bottom: 10px; }
.hist-ex-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.hist-set-row { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; }
.hist-set-chip { background: var(--bg3); border-radius: 6px; padding: 4px 10px; font-size: 12px; color: var(--text); font-weight: 500; }
.hist-set-chip.done { border: 1px solid #155b2b; background: var(--green-bg); color: var(--green); }
.hist-comment { font-size: 12px; color: var(--text3); margin-top: 4px; font-style: italic; }
.hist-filter { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; }
.hist-filter::-webkit-scrollbar { display: none; }
.hist-filter-btn { padding: 6px 12px; border-radius: 8px; background: var(--bg2); border: 1px solid var(--border2); color: var(--text2); font-size: 12px; font-weight: 500; white-space: nowrap; cursor: pointer; flex-shrink: 0; }
.hist-filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
.del-btn { float: right; background: var(--red-bg); color: var(--red); border: 1px solid #5b1515; border-radius: 7px; padding: 4px 10px; font-size: 11px; cursor: pointer; }

/* ===== STATS SCREEN ===== */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
.stat-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.stat-value { font-size: 26px; font-weight: 700; color: var(--accent); }
.stat-unit { font-size: 13px; color: var(--text2); font-weight: 400; }
.pr-list { }
.pr-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
.pr-row:last-child { border-bottom: none; }
.pr-ex { font-size: 13px; color: var(--text); font-weight: 500; flex: 1; }
.pr-val { font-size: 13px; font-weight: 700; color: var(--green); }
.streak-bar { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
.streak-dot { width: 12px; height: 12px; border-radius: 3px; background: var(--border); }
.streak-dot.done { background: var(--accent); }
.streak-dot.rest { background: var(--bg3); border: 1px solid var(--border2); }

/* Scrollbar hidden globally */
::-webkit-scrollbar { display: none; }
* { scrollbar-width: none; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div>
      <div id="header-title">🐂 Saala Saand</div>
      <div id="header-sub">UL/UL/Full · 5 days/week</div>
    </div>
    <div id="header-right"></div>
  </div>
  <div id="content">
    <!-- SCREENS INJECTED BY JS -->
  </div>
  <div id="tabbar">
    <button class="tab-btn active" onclick="switchTab('log')" id="tab-log">
      <span class="tab-icon">🏋️</span>Log
    </button>
    <button class="tab-btn" onclick="switchTab('plan')" id="tab-plan">
      <span class="tab-icon">📋</span>Plan
    </button>
    <button class="tab-btn" onclick="switchTab('history')" id="tab-history">
      <span class="tab-icon">📓</span>History
    </button>
    <button class="tab-btn" onclick="switchTab('stats')" id="tab-stats">
      <span class="tab-icon">📈</span>Stats
    </button>
  </div>
</div>

<script>
// ============================================================
//  DATA
// ============================================================
const PHASES = [
  {
    label: "Phase 1 — Cut",
    note: "Fat loss phase. Train hard, keep rest periods tight. Cardio 3x/week — after Mon or Tue lifting, Thu after upper B, and one outdoor walk on Wed or Sat. Every session starts with 7 min posture warm-up.",
    days: [
      { l:"Mon", t:"Upper A", rst:false, focus:"Chest · Back · Traps · Posture", bc:"#0C447C", sub:"6 exercises incl. warm-up · ~60 min",
        ex:[
          {n:"Cable face pull (rope, eye level)", note:"Posture warm-up — always first. Elbows HIGH, split rope at face, 1 sec hold.", s:"3 × 20", tag:"fix"},
          {n:"Incline barbell press", note:"Upper chest priority. 3 sec negative. Log the weight.", s:"4 × 6–8", tag:"key"},
          {n:"Weighted pull-ups", note:"Lat width. Add weight once you hit 8 clean reps.", s:"4 × 5–7", tag:"key"},
          {n:"Barbell shrug (heavy)", note:"2 sec squeeze at top. Go heavy. Trap priority.", s:"4 × 8–10", tag:"trap"},
          {n:"Seated cable row (wide grip)", note:"Retract scapula fully at the end of each rep. Mid back.", s:"3 × 10–12", tag:"fix"},
          {n:"Cable lateral raise (unilateral)", note:"Side delt width. Slow, strict — no body swing.", s:"3 × 12–15"}
        ]
      },
      { l:"Tue", t:"Lower A", rst:false, focus:"Quads · Hamstrings · Glutes · Knee fix", bc:"#633806", sub:"6 exercises incl. warm-up · ~60 min",
        ex:[
          {n:"Hip abduction machine", note:"Knee fix warm-up. Slow reps, full range. Before every leg session.", s:"3 × 15–20", tag:"fix"},
          {n:"Glute bridge (barbell)", note:"Hip extension activation. Drives glute med. Replaces clamshells.", s:"3 × 15", tag:"fix"},
          {n:"Leg press (high, wide foot placement)", note:"Push knees out over pinky toe every rep. Log the weight.", s:"4 × 8–10", tag:"key"},
          {n:"Romanian deadlift (DB or barbell)", note:"3 sec negative. Feel the hamstring stretch at the bottom.", s:"4 × 8–10", tag:"key"},
          {n:"Bulgarian split squat (DB)", note:"Front knee tracks over pinky toe. Corrects left-right imbalance.", s:"3 × 8–10 each"},
          {n:"Standing calf raise", note:"Full ROM. Pause at bottom 1 sec.", s:"4 × 15–20"}
        ]
      },
      { l:"Wed", t:"Rest", rst:true, note:"Full rest or 30 min outdoor walk (fasted morning). Stretch hip flexors and chest. Still hit 175 g protein today." },
      { l:"Thu", t:"Upper B", rst:false, focus:"Shoulders · Back · Traps · Arms", bc:"#085041", sub:"6 exercises incl. warm-up · ~60 min",
        ex:[
          {n:"Band pull-aparts", note:"Posture warm-up. Arms straight, pull band to chest, squeeze rear delt.", s:"2 × 20", tag:"fix"},
          {n:"Overhead press (barbell)", note:"Primary delt and upper trap builder. Log every session.", s:"4 × 5–7", tag:"key"},
          {n:"Barbell row (Pendlay)", note:"Pull bar to lower chest. Full back thickness.", s:"4 × 6–8", tag:"key"},
          {n:"Rack pull (just above knee)", note:"Heavy upper trap and rhomboid mass. Controlled descent.", s:"4 × 5–6", tag:"trap"},
          {n:"Rear delt fly (machine or cable)", note:"Elbows slightly bent, lead with elbows back. Posture fix.", s:"3 × 15–20", tag:"fix"},
          {n:"Barbell curl + tricep pushdown (superset)", note:"Arms at end of session when pre-fatigued.", s:"3 × 10 each"}
        ]
      },
      { l:"Fri", t:"Lower B", rst:false, focus:"Quads · Posterior chain · Hip stability", bc:"#633806", sub:"6 exercises incl. warm-up · ~60 min",
        ex:[
          {n:"Hip abduction machine", note:"Glute med activation before heavy lower work.", s:"3 × 15", tag:"fix"},
          {n:"Trap bar deadlift", note:"Safer than conventional. Feet hip-width, drive floor away, chest tall.", s:"4 × 5–6", tag:"key"},
          {n:"Hack squat (machine)", note:"Feet mid-platform, push knees out. Deep range of motion.", s:"4 × 8–10", tag:"key"},
          {n:"Walking lunges (DB)", note:"Push knees out actively. Glute med engagement each step.", s:"3 × 10 each"},
          {n:"Leg extension + lying leg curl (superset)", note:"Quad and hamstring finisher.", s:"3 × 12 each"},
          {n:"Seated calf raise", note:"Slow, full range.", s:"4 × 15"}
        ]
      },
      { l:"Sat", t:"Full body", rst:false, focus:"Compound volume + weak points + traps", bc:"#3C3489", sub:"5 exercises · Moderate intensity · ~55 min",
        ex:[
          {n:"Flat barbell bench press", note:"Moderate weight. Focus on chest contraction and full stretch.", s:"4 × 8–10"},
          {n:"Lat pulldown (wide grip)", note:"Lat width from different angle than pull-ups.", s:"4 × 8–10", tag:"key"},
          {n:"DB shrug + cable face pull (superset)", note:"Traps and posture together. Never skip this.", s:"4 × 10 + 20", tag:"trap"},
          {n:"Leg press (moderate weight)", note:"Active leg recovery. Not max effort.", s:"3 × 12"},
          {n:"Incline DB curl", note:"Full bicep stretch at the bottom. Slow and controlled.", s:"3 × 10–12"}
        ]
      },
      { l:"Sun", t:"Rest", rst:true, note:"Full rest. Weigh yourself fasted. Log weight. Review last week's training log. Plan next week's lifts." }
    ]
  },
  {
    label: "Phase 2 — Build",
    note: "Lean bulk phase. 200 kcal above maintenance. Beat last week on every compound — that is the entire point of this phase. Cardio drops to 2x/week. Gain no more than 0.4 kg per week.",
    days: [
      { l:"Mon", t:"Upper A", rst:false, focus:"Chest · Back · Traps · Posture", bc:"#0C447C", sub:"6 exercises incl. warm-up · ~65 min",
        ex:[
          {n:"Cable face pull (rope, eye level)", note:"Always first. Still a priority even in bulk.", s:"3 × 20", tag:"fix"},
          {n:"Incline barbell press", note:"Heavier than Phase 1. 5×5 strength focus.", s:"5 × 5", tag:"key"},
          {n:"Weighted pull-ups", note:"Add belt weight. Target 5–6 reps with load.", s:"5 × 5–6", tag:"key"},

function todayDayIdx() {
  const d = new Date().getDay(); // 0=Sun,1=Mon...6=Sat
  const map = [6,0,1,2,3,4,5]; // Sun→6(rest), Mon→0, Tue→1...
  return map[d];
}

// ============================================================
//  LOCAL STORAGE HELPERS
// ============================================================
function getKey(dateStr) { return 'ss_log_' + dateStr; }

function saveLog(dateStr, data) {
  localStorage.setItem(getKey(dateStr), JSON.stringify(data));
}

function loadLog(dateStr) {
  const raw = localStorage.getItem(getKey(dateStr));
  return raw ? JSON.parse(raw) : null;
}

function getAllLogs() {
  const logs = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k.startsWith('ss_log_')) {
      const dateStr = k.replace('ss_log_', '');
      logs.push({ dateStr, data: JSON.parse(localStorage.getItem(k)) });
    }
  }
  return logs.sort((a,b) => b.dateStr.localeCompare(a.dateStr));
}

function deleteLog(dateStr) {
  localStorage.removeItem(getKey(dateStr));
}

// ============================================================
//  UTILS
// ============================================================
function dateFromOffset(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d;
}

let logDateOffset = 0;

function getLogDate() {
  return dateFromOffset(logDateOffset);
}

function fmtDate(d) {
  return d.toISOString().split('T')[0];
}

function fmtDateNice(d) {
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(d); target.setHours(0,0,0,0);
  const diff = Math.round((target - today) / 86400000);
  let rel = '';
  if (diff === 0) rel = 'Today';
  else if (diff === -1) rel = 'Yesterday';
  else if (diff === 1) rel = 'Tomorrow';
  else rel = days[d.getDay()];
  return { main: rel, sub: days[d.getDay()] + ', ' + d.getDate() + ' ' + months[d.getMonth()] };
}

function dayForDate(d) {
  const dow = d.getDay(); // 0=Sun,1=Mon...6=Sat
  const map = [6,0,1,2,3,4,5];
  return map[dow];
}

function tagBadge(tag) {
  const cl = { fix:'b-fix', key:'b-key', trap:'b-trap', swap:'b-swap' };
  const lb = { fix:'posture', key:'priority', trap:'traps', swap:'swapped' };
  if (!tag) return '';
  return `<span class="badge ${cl[tag]}">${lb[tag]}</span>`;
}

// ============================================================
function switchTab(tab) {
  currentTab = tab;
  ['log','plan','history','stats'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
  renderContent();
}

function renderContent() {
  const c = document.getElementById('content');
  if (currentTab === 'log') c.innerHTML = renderLog();
  else if (currentTab === 'plan') c.innerHTML = renderPlan();
  else if (currentTab === 'history') c.innerHTML = renderHistory();
  else if (currentTab === 'stats') c.innerHTML = renderStats();
}

function renderLog() {
  const date = getLogDate();
  const dateStr = fmtDate(date);
  const dayIdx = dayForDate(date);
  const day = PHASES[logPhase].days[dayIdx];
  const { main, sub } = fmtDateNice(date);
  const saved = loadLog(dateStr) || {};

  let html = `<div class="screen active" id="screen-log">`;
  
  // Date nav
  html += `<div class="log-date-bar">
    <button class="log-date-btn" onclick="shiftLogDate(-1)">‹</button>
    <div class="log-date-display">
      <div class="log-date-main">${main}</div>
      <div class="log-date-sub">${sub}</div>
    </div>
    <button class="log-date-btn" onclick="shiftLogDate(1)">›</button>
  </div>`;

  // Phase selector (small)
  html += `<div class="phase-tabs" style="margin-bottom:12px;">
    <button class="phase-tab ${logPhase===0?'active':''}" onclick="setLogPhase(0)">Phase 1 – Cut</button>
    <button class="phase-tab ${logPhase===1?'active':''}" onclick="setLogPhase(1)">Phase 2 – Build</button>
  </div>`;

  if (day.rst) {
    html += `<div class="rest-day-log">
      <div class="rest-day-icon">😴</div>
      <div class="rest-day-txt">${day.l} — Rest Day</div>
      <div class="rest-day-note">${day.note}</div>
    </div>`;
    html += `</div>`;
    return html;
  }

  // Workout header
  html += `<div class="log-workout-header">
    <div class="log-day-type">${day.l} — ${day.t}</div>
    <div class="log-day-focus">${day.focus} · ${day.sub}</div>
  </div>`;

  // Exercises
  day.ex.forEach((ex, ei) => {
    const exKey = 'ex_' + ei;
    const exData = saved[exKey] || { sets: [{ kg: '', reps: '', done: false }], comment: '' };
    
    html += `<div class="log-ex-card">
      <div class="log-ex-header">
        <div>
          <div class="log-ex-name">${ex.n}${tagBadge(ex.tag)}</div>
          <div class="log-ex-target">${ex.s}${ex.note ? ' · ' + ex.note : ''}</div>
        </div>
      </div>
      <div class="log-sets-area">
        <div class="log-set-input-labels">
          <span>SET</span><span>KG</span><span>REPS</span><span>✓</span>
        </div>`;

    exData.sets.forEach((set, si) => {
      html += `<div class="log-set-row" id="setrow_${ei}_${si}">
        <div class="set-num">${si + 1}</div>
        <input class="set-input" type="number" inputmode="decimal" placeholder="kg" value="${set.kg}" onchange="updateSet(${ei},${si},'kg',this.value)">
        <input class="set-input" type="number" inputmode="numeric" placeholder="reps" value="${set.reps}" onchange="updateSet(${ei},${si},'reps',this.value)">
        <button class="set-done-btn ${set.done ? 'done' : ''}" onclick="toggleSetDone(${ei},${si})">✓</button>
      </div>`;
    });

    html += `<button class="log-add-set" onclick="addSet(${ei})">+ Add set</button>
      </div>
      <div class="log-comment-row">
        <textarea class="log-comment-input" placeholder="Notes / comments for this exercise…" onchange="updateComment(${ei},this.value)">${exData.comment || ''}</textarea>
      </div>
    </div>`;
  });

  html += `<button class="save-btn" onclick="saveWorkout()">💾 Save Workout</button>
    <div class="save-success" id="save-success">✅ Workout saved!</div>
  </div>`;

  return html;
}

function shiftLogDate(d) {
  logDateOffset += d;
  renderContent();
}

function setLogPhase(p) {
  logPhase = p;
  renderContent();
}

function getCurrentLogData() {
  const date = getLogDate();
  const dateStr = fmtDate(date);
  return { dateStr, data: loadLog(dateStr) || {} };
}

function updateSet(ei, si, field, val) {
  const { dateStr, data } = getCurrentLogData();
  const exKey = 'ex_' + ei;
  if (!data[exKey]) data[exKey] = { sets: [], comment: '' };
  while (data[exKey].sets.length <= si) data[exKey].sets.push({ kg: '', reps: '', done: false });
  data[exKey].sets[si][field] = val;
  saveLog(dateStr, data);
}

function toggleSetDone(ei, si) {
  const { dateStr, data } = getCurrentLogData();
  const exKey = 'ex_' + ei;
  if (!data[exKey]) data[exKey] = { sets: [], comment: '' };
  while (data[exKey].sets.length <= si) data[exKey].sets.push({ kg: '', reps: '', done: false });
  data[exKey].sets[si].done = !data[exKey].sets[si].done;
  saveLog(dateStr, data);
  // Just update the button without full re-render
  const btn = document.querySelector(`#setrow_${ei}_${si} .set-done-btn`);
  if (btn) btn.classList.toggle('done', data[exKey].sets[si].done);
}

function addSet(ei) {
  const { dateStr, data } = getCurrentLogData();
  const exKey = 'ex_' + ei;
  const date = getLogDate();
  const dayIdx = dayForDate(date);
  const day = PHASES[logPhase].days[dayIdx];
  if (!data[exKey]) data[exKey] = { sets: [], comment: '' };
  data[exKey].sets.push({ kg: '', reps: '', done: false });
  saveLog(dateStr, data);
  renderContent(); // re-render to show new set
}

function updateComment(ei, val) {
  const { dateStr, data } = getCurrentLogData();
  const exKey = 'ex_' + ei;
  if (!data[exKey]) data[exKey] = { sets: [], comment: '' };
  data[exKey].comment = val;
  saveLog(dateStr, data);
}

function saveWorkout() {
  // Data is already auto-saved. Just mark as "saved" with a timestamp and show confirmation.
  const { dateStr, data } = getCurrentLogData();
  const date = getLogDate();
  const dayIdx = dayForDate(date);
  const day = PHASES[logPhase].days[dayIdx];
  data._meta = { dayType: day.t, focus: day.focus, phase: logPhase, savedAt: new Date().toISOString() };
  saveLog(dateStr, data);
  const el = document.getElementById('save-success');
  if (el) { el.style.display = 'block'; setTimeout(() => { el.style.display = 'none'; }, 2500); }
}

// ============================================================
//  HISTORY SCREEN
// ============================================================
function renderHistory() {
  const logs = getAllLogs();
  let html = `<div class="screen active" id="screen-history">`;
  html += `<div style="font-size:18px;font-weight:700;margin-bottom:14px;">Workout History</div>`;

  if (logs.length === 0) {
    html += `<div class="history-empty">No workouts logged yet.<br>Start training to see history here.</div>`;
    html += `</div>`;
    return html;
  }

  logs.forEach(({ dateStr, data }) => {
    const d = new Date(dateStr + 'T00:00:00');
    const dayIdx = dayForDate(d);
    const phase = data._meta ? data._meta.phase : 0;
    const day = PHASES[phase] ? PHASES[phase].days[dayIdx] : PHASES[0].days[dayIdx];
    const exKeys = Object.keys(data).filter(k => k.startsWith('ex_'));
    const totalSets = exKeys.reduce((acc, k) => acc + (data[k].sets || []).length, 0);
    const doneSets = exKeys.reduce((acc, k) => acc + (data[k].sets || []).filter(s => s.done).length, 0);
    const isOpen = expandedHist === dateStr;

    const daysArr = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const niceDateMain = daysArr[d.getDay()] + ', ' + d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();

    html += `<div class="hist-day">
      <div class="hist-day-header" onclick="toggleHist('${dateStr}')">
        <div>
          <div class="hist-day-date">${niceDateMain}</div>
          <div class="hist-day-type">${day.l} — ${day.t}</div>
        </div>
        <div class="hist-day-meta">
          <div class="hist-day-count">${doneSets}/${totalSets} sets done</div>
          <div class="hist-day-sets">${exKeys.length} exercises · ${isOpen ? '▲' : '▼'}</div>
        </div>
      </div>
      <div class="hist-expand ${isOpen ? 'open' : ''}">
        <button class="del-btn" onclick="event.stopPropagation();confirmDeleteLog('${dateStr}')">Delete</button>`;

    exKeys.forEach(k => {
      const ei = parseInt(k.replace('ex_', ''));
      const exData = data[k];
      const exName = day.ex && day.ex[ei] ? day.ex[ei].n : 'Exercise ' + (ei + 1);
      html += `<div class="hist-ex">
        <div class="hist-ex-name">${exName}</div>`;
      (exData.sets || []).forEach((s, si) => {
        html += `<div class="hist-set-row">
          <span class="hist-set-chip ${s.done ? 'done' : ''}">Set ${si+1}: ${s.kg ? s.kg + ' kg' : '—'} × ${s.reps || '—'} reps${s.done ? ' ✓' : ''}</span>
        </div>`;
      });
      if (exData.comment) html += `<div class="hist-comment">💬 ${exData.comment}</div>`;
      html += `</div>`;
    });

    html += `</div></div>`;
  });

  html += `</div>`;
  return html;
}

function toggleHist(dateStr) {
  expandedHist = expandedHist === dateStr ? null : dateStr;
  renderContent();
}

function confirmDeleteLog(dateStr) {
  if (confirm('Delete this workout log?')) {
    deleteLog(dateStr);
    if (expandedHist === dateStr) expandedHist = null;
    renderContent();
  }
}

// ============================================================
//  STATS SCREEN
// ============================================================
function renderStats() {
  const logs = getAllLogs();
  let html = `<div class="screen active" id="screen-stats">`;
  html += `<div style="font-size:18px;font-weight:700;margin-bottom:14px;">Stats & PRs</div>`;

  // Summary metrics
  const totalWorkouts = logs.filter(l => {
    const dayIdx = dayForDate(new Date(l.dateStr + 'T00:00:00'));
    const phase = l.data._meta ? l.data._meta.phase : 0;
    return !PHASES[phase].days[dayIdx].rst;
  }).length;

  const totalSets = logs.reduce((acc, { data }) => {
    return acc + Object.keys(data).filter(k => k.startsWith('ex_')).reduce((a, k) => a + (data[k].sets || []).length, 0);
  }, 0);

  // Streak calc
  let streak = 0;
  const today = new Date(); today.setHours(0,0,0,0);
  for (let i = 0; i < 60; i++) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    const ds = fmtDate(d);
    const dayIdx = dayForDate(d);
    const isRest = PHASES[0].days[dayIdx].rst;
    if (isRest) continue;
    if (logs.find(l => l.dateStr === ds)) streak++;
    else break;
  }

  html += `<div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Workouts Logged</div><div class="stat-value">${totalWorkouts}</div></div>
    <div class="stat-card"><div class="stat-label">Total Sets</div><div class="stat-value">${totalSets}</div></div>
    <div class="stat-card"><div class="stat-label">Current Streak</div><div class="stat-value">${streak}<span class="stat-unit"> days</span></div></div>
    <div class="stat-card"><div class="stat-label">Weeks Active</div><div class="stat-value">${Math.max(1, Math.ceil(totalWorkouts/5))}</div></div>
  </div>`;

  // PRs (max weight per exercise)
  html += `<div class="section-label">Personal Records (max weight logged)</div>`;

  const prMap = {};
  logs.forEach(({ data, dateStr }) => {
    const d = new Date(dateStr + 'T00:00:00');
    const dayIdx = dayForDate(d);
    const phase = data._meta ? data._meta.phase : 0;
    const day = PHASES[phase] ? PHASES[phase].days[dayIdx] : null;
    if (!day || day.rst) return;
    Object.keys(data).filter(k => k.startsWith('ex_')).forEach(k => {
      const ei = parseInt(k.replace('ex_', ''));
      const exName = day.ex && day.ex[ei] ? day.ex[ei].n : null;
      if (!exName) return;
      const maxKg = Math.max(...(data[k].sets || []).map(s => parseFloat(s.kg) || 0));
      if (maxKg > 0 && (!prMap[exName] || maxKg > prMap[exName])) prMap[exName] = maxKg;
    });
  });

  const prEntries = Object.entries(prMap).sort((a,b) => b[1]-a[1]);
  if (prEntries.length === 0) {
    html += `<div class="card"><div class="card-sub">No PRs yet — start logging sets with weights to track records.</div></div>`;
  } else {
    html += `<div class="card pr-list">`;
    prEntries.forEach(([ex, kg]) => {
      html += `<div class="pr-row">
        <div class="pr-ex">${ex}</div>
        <div class="pr-val">${kg} kg 🏆</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Last 14 day activity dots
  html += `<div class="section-label">Last 14 days</div><div class="card">`;
  html += `<div class="streak-bar">`;
  for (let i = 13; i >= 0; i--) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    const ds = fmtDate(d);
    const dayIdx = dayForDate(d);
    const isRest = PHASES[0].days[dayIdx].rst;
    const hasLog = !!logs.find(l => l.dateStr === ds);
    html += `<div class="streak-dot ${isRest ? 'rest' : hasLog ? 'done' : ''}" title="${ds}"></div>`;
  }
  html += `</div>
    <div style="display:flex;gap:16px;margin-top:10px;font-size:11px;color:var(--text3);">
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--accent);vertical-align:middle;margin-right:4px;"></span>Trained</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--border);vertical-align:middle;margin-right:4px;"></span>Missed</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--bg3);border:1px solid var(--border2);vertical-align:middle;margin-right:4px;"></span>Rest day</span>
    </div>
  </div>`;

  html += `</div>`;
  return html;
}

// ============================================================
//  INIT
// ============================================================
window._schedPhase = 0;
window._schedDay = 0;
renderContent();
