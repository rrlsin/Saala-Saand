<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRIMAL</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0b0b0f;
  --bg2: #12121a;
  --bg3: #1a1a24;
  --border: rgba(255,255,255,0.06);

  --text: #ffffff;
  --text2: #a1a1aa;

  --accent: #7c5cff;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
}

#app {
  padding: 20px;
}

h1 {
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 20px;
}

.card {
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 16px;

  box-shadow:
    0 10px 30px rgba(0,0,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.05);

  transition: all 0.2s ease;
}

.card:hover {
  transform: translateY(-3px);
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #7c5cff, #00d4ff);
  color: white;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s ease;
}

button:active {
  transform: scale(0.96);
}

.stat {
  font-size: 28px;
  font-weight: 800;
  background: linear-gradient(90deg, #7c5cff, #00d4ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

#fab {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg, #7c5cff, #00d4ff);
  font-size: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

</style>
</head>
<body>

<div id="app">
  <h1>PRIMAL</h1>

  <div class="card">
    <div>Workouts Logged</div>
    <div class="stat" id="workouts">0</div>
  </div>

  <div class="card">
    <div>Current Streak</div>
    <div class="stat" id="streak">0</div>
  </div>

  <button onclick="logWorkout()">💾 Log Workout</button>
  <button onclick="analyseWorkout()" style="margin-top:10px;">🧠 Analyse Workout</button>
</div>

<div id="fab">+</div>

<script>
let workouts = 0;
let streak = 0;

function logWorkout() {
  workouts++;
  streak++;

  document.getElementById('workouts').innerText = workouts;
  document.getElementById('streak').innerText = streak;

  alert("🔥 Streak +1 — You're unstoppable.");

  if (streak % 5 === 0) {
    alert("🏆 5 Day Streak! You're ahead of 95% people.");
  }
}

function analyseWorkout() {
  alert("\n📊 Analysis:\n\nVolume: 7/10\nRecovery: 6/10\n\n👉 Add 1 compound lift\n👉 Reduce junk volume\n👉 Improve progressive overload\n");
}
</script>

</body>
</html>
